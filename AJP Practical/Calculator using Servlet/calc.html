<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Calculator</title>
</head>

<body>

<form action="CalculatorServlet" method="post">

Enter First Number
<input type="text" name="txtN1">

<br>

Enter Second Number
<input type="text" name="txtN2">

<br>

Select an Operation

<br>

<input type="radio" name="opr" value="+"> ADDITION

<input type="radio" name="opr" value="*"> MULTIPLY

<input type="radio" name="opr" value="/"> DIVIDE

<input type="radio" name="opr" value="-"> Subtraction

<br>

<input type="reset">

<br><br>

<input type="submit" value="Calculate">

</form>

</body>
</html>
